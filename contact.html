<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — FitnessCalcHub.net</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#b8f400">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#050a0e; --surface:#0a1520; --card:#0d1c2e; --border:#1a3a5c; --lime:#b8f400; --lime-dim:#2d3d00; --text:#e8f4f8; --text-muted:#5a8fa8; --text-dim:#1e4060; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; font-weight:300; }
  .bg-grid { position:fixed; inset:0; background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  header { position:relative; z-index:10; padding:0 40px; height:70px; display:flex; align-items:center; border-bottom:1px solid var(--border); background:rgba(5,10,14,0.92); backdrop-filter:blur(20px); }
  .logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
  .logo-icon { width:38px; height:38px; background:var(--lime); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
  .logo-text { font-family:'Bebas Neue',cursive; font-size:1.6rem; letter-spacing:0.05em; color:var(--text); }
  .logo-text span { color:var(--lime); }
  .content { position:relative; z-index:1; max-width:560px; margin:0 auto; padding:60px 24px 100px; }
  h1 { font-family:'Bebas Neue',cursive; font-size:2.5rem; letter-spacing:0.04em; margin-bottom:10px; }
  h1 span { color:var(--lime); }
  .subtitle { color:var(--text-muted); font-size:0.95rem; margin-bottom:36px; line-height:1.7; }
  .form-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:32px; }
  .field { display:flex; flex-direction:column; gap:7px; margin-bottom:18px; }
  label { font-size:0.72rem; font-weight:600; color:var(--text-muted); letter-spacing:0.08em; text-transform:uppercase; }
  input, textarea, select { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:11px 14px; border-radius:10px; font-family:'Barlow',sans-serif; font-size:0.92rem; outline:none; transition:all 0.2s; width:100%; }
  input:focus, textarea:focus { border-color:var(--lime-dim); background:rgba(184,244,0,0.04); }
  textarea { resize:vertical; min-height:100px; line-height:1.6; }
  select { cursor:pointer; appearance:none; }
  .submit-btn { width:100%; background:var(--lime); color:#050a0e; border:none; padding:14px; font-family:'Barlow Condensed',sans-serif; font-size:1rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; border-radius:10px; margin-top:6px; transition:all 0.2s; }
  .submit-btn:hover { background:#d4ff00; transform:translateY(-1px); }
  .success { display:none; margin-top:14px; padding:14px 18px; background:rgba(184,244,0,0.08); border-left:2px solid var(--lime); color:var(--lime); font-size:0.85rem; border-radius:0 8px 8px 0; }
  footer { position:relative; z-index:1; border-top:1px solid var(--border); padding:28px 40px; display:flex; justify-content:space-between; }
  footer p, footer a { font-size:0.75rem; color:var(--text-dim); text-decoration:none; }
  @media(max-width:768px) { header{padding:0 16px} footer{flex-direction:column;gap:10px} }
</style>
</head>
<body>
<div class="bg-grid"></div>
<header>
  <a href="index.html" class="logo">
    <div class="logo-icon">💪</div>
    <span class="logo-text">Fitness<span>CalcHub</span></span>
  </a>
</header>
<div class="content">
  <h1>Get in <span>Touch</span></h1>
  <p class="subtitle">Found a calculation error? Want a new calculator added? We'd love to hear from you.</p>
  <div class="form-card">
    <div class="field"><label>Your Name</label><input type="text" id="name" placeholder="Alex Smith"></div>
    <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="alex@example.com"></div>
    <div class="field">
      <label>Subject</label>
      <select id="subject">
        <option value="">Select a topic...</option>
        <option>Calculation seems wrong</option>
        <option>Request a new calculator</option>
        <option>General feedback</option>
        <option>App / PWA issue</option>
        <option>Partnership / advertising</option>
        <option>Other</option>
      </select>
    </div>
    <div class="field"><label>Message</label><textarea id="message" placeholder="Tell us more..."></textarea></div>
    <button class="submit-btn" onclick="handleSubmit()">Send Message →</button>
    <div class="success" id="successMsg">✓ Message sent! We'll get back to you within 2 business days.</div>
  </div>
</div>
<footer>
  <p>© 2025 FitnessCalcHub.net — Not medical advice</p>
  <div style="display:flex;gap:20px"><a href="privacy.html">Privacy</a><a href="about.html">About</a></div>
</footer>
<script>
function handleSubmit() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const message = document.getElementById('message').value.trim();
  if (!name || !email || !message) { alert('Please fill in all required fields.'); return; }
  document.getElementById('successMsg').style.display = 'block';
  const btn = document.querySelector('.submit-btn');
  btn.disabled = true; btn.textContent = 'Sent ✓';
  btn.style.background = 'var(--lime)';
}
</script>
</body>
</html>
